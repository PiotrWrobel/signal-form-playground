<mat-card class="create-account-card">
  <h2>Create account (Reactive Form)</h2>

  <form [formRoot]="form" class="create-account-form">
    <mat-form-field appearance="outline">
      <mat-label>Username</mat-label>
      <input matInput type="text" [formField]="form.username" />

      @for (error of form.username().errors(); track error.kind) {
        <mat-error>{{error.message}}</mat-error>
      }
    </mat-form-field>

    @if (!form.password().hidden()) {
      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" [formField]="form.password" />
        @for (error of form.password().errors(); track error.kind) {
          <mat-error>{{error.message}}</mat-error>
        }
      </mat-form-field>
    }


    <button mat-flat-button color="primary" type="submit">Login</button>

    <button mat-flat-button color="primary" type="button"  (click)="modifyUsername()">Mock user name</button>
    <button mat-flat-button color="primary" type="button"  (click)="form().reset()">Reset Form</button>
  </form>
</mat-card>
